# Nginx reverse proxy configuration for production
# Routes:
#   /api/*    -> backend:8081
#   /ai/*     -> ai-service:5000
#   /*        -> frontend:80

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Increase proxy buffer for large responses
    proxy_buffer_size   128k;
    proxy_buffers       4 256k;
    proxy_busy_buffers_size   256k;

    # Frontend static file serving
    upstream frontend {
        server frontend:80;
    }

    # Backend API
    upstream backend {
        server backend:8081;
    }

    # AI Service
    upstream ai_service {
        server ai-service:5000;
    }

    server {
        listen 80;
        server_name _;
        charset utf-8;

        # ---------- API Routes ----------
        # Proxy /api/* requests to the Java backend
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            # Increase timeout for long-running API requests
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # ---------- AI Service Routes ----------
        # Proxy /ai/* requests to the Python AI service
        location /ai/ {
            proxy_pass http://ai_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            # AI service may need longer timeouts for processing
            proxy_connect_timeout 120s;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            # Increase body size for AI requests
            client_max_body_size 50M;
        }

        # ---------- AI Service Health ----------
        location = /ai/health {
            proxy_pass http://ai_service/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ---------- Frontend Static Files ----------
        # Serve all other requests from the frontend nginx
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable buffering for Server-Sent Events (if needed)
            proxy_buffering off;

            # Try to serve the static file, fallback to index.html for SPA routing
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }
    }
}