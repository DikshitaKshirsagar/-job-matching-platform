spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  jwt:
    secret: test-secret-key-that-is-at-least-sixtyfour-bytes-long-for-hs512-signing-algorithm!!
    expiration-ms: 86400000
  ai-service:
    base-url: http://localhost:5000
    timeout-seconds: 5