# ===============================
# APPLICATION CONFIG
# ===============================
server.port=8081
server.error.include-stacktrace=never

# ===============================
# MYSQL DATABASE
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/jobmatch_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# FLYWAY / JPA
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# CONNECTION POOL
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=HikariPool

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=${JWT_SECRET:ChangeMeSecretKey2026}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# AI SERVICE
# ===============================
ai.service.url=${AI_SERVICE_URL:http://localhost:5000}

# ===============================
# OPENAPI / ACTUATOR
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
management.endpoints.web.exposure.include=health,info

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=INFO
logging.level.com.jobmatch=DEBUG

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.resume.max-size=10485760
app.resume.max-text-length=100000
