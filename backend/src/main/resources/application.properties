# ===============================
# APPLICATION CONFIG
# ===============================
server.port=8081
server.error.include-stacktrace=never

# ===============================
# MYSQL DATABASE
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3307/jobmatch_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# ===============================
# HIKARI CONNECTION POOL
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=HikariPool


# ===============================
# JWT CONFIG
# ===============================
jwt.secret=MySuperSecretKey1234567890JobMatchSecureKey2026
jwt.expiration=86400000


# ===============================
# AI SERVICE
# ===============================
ai.service.url=http://localhost:5000


# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=INFO
logging.level.com.jobmatch=DEBUG


# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.resume.max-size=10485760
app.resume.max-text-length=100000
