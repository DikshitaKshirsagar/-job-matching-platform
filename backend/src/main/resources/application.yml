spring:
  application:
    name: job-matching-platform

  datasource:
    url: ${DB_URI:${DB_URL:jdbc:mysql://localhost:3307/jobmatch_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        default_batch_fetch_size: 100
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8081}
  error:
    include-message: never
    include-stacktrace: never

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-minimum-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  ai-service:
    base-url: ${AI_SERVICE_URL:http://localhost:5000}
    timeout-seconds: 30
  file-upload:
    upload-dir: ${UPLOAD_DIR:uploads}
    allowed-extensions: pdf,doc,docx
    max-size-bytes: 5242880
  resume:
    max-size: 10485760
    max-text-length: 100000

logging:
  level:
    com.jobmatch: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info
