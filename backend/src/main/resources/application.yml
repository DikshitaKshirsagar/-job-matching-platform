spring:
  application:
    name: job-matching-platform

  datasource:
    url: ${DB_URI:${DB_URL:jdbc:mysql://localhost:3307/jobmatch_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        default_batch_fetch_size: 100
    open-in-view: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: false

server:
  port: ${PORT:8081}
  error:
    include-message: never
    include-stacktrace: never

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  ai-service:
    base-url: ${AI_SERVICE_URL}
    api-key: ${AI_SERVICE_API_KEY:}
    timeout-seconds: 30
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  file-upload:
    upload-dir: ${UPLOAD_DIR:uploads}
    allowed-extensions: pdf,doc,docx
    max-size-bytes: 5242880
    allowed-mime-types: application/pdf
  rate-limit:
    auth:
      capacity: 20
      refill-tokens: 20
      refill-minutes: 1
  resume:
    max-size: 10485760
    max-text-length: 100000

logging:
  level:
    com.jobmatch: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
