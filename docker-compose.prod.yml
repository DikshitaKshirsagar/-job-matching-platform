version: '3.8'

# Production Docker Compose for Job Matching Platform
# Differences from docker-compose.yml:
#   - Removed phpmyadmin (security risk - exposed DB credentials)
#   - Added frontend Nginx container serving React production build
#   - Added Nginx reverse proxy for unified routing
#   - Uses secrets for sensitive values instead of environment variables
#   - Activates Spring 'prod' profile
#   - No port exposure on backend/ai-service (routed through nginx only)

secrets:
  db_password:
    file: ./secrets/db_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  ai_service_api_key:
    file: ./secrets/ai_service_api_key.txt

services:
  # ---------- MySQL Database ----------
  mysql:
    image: mysql:8.0
    container_name: jobmatch-mysql-prod
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-jobmatch_db}
      MYSQL_USER: ${DB_USERNAME:-root}
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
    ports:
      # Not exposed externally in production; internal only
      # Exposed here for host tooling if needed (comment out if not)
      - '3307:3306'
    volumes:
      - mysql-data-prod:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
    secrets:
      - db_password
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

  # ---------- AI Service ----------
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: jobmatch-ai-service-prod
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      AI_SERVICE_API_KEY_FILE: /run/secrets/ai_service_api_key
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    secrets:
      - ai_service_api_key
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 512M

  # ---------- Backend (Spring Boot) ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobmatch-backend-prod
    restart: unless-stopped
    expose:
      - "8081"
    env_file:
      - ./backend/.env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Override DB_URI with Docker service name (internal Docker network)
      DB_URI: jdbc:mysql://mysql:3306/jobmatch_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      # Override AI_SERVICE_URL with Docker service name
      AI_SERVICE_URL: http://ai-service:5000
      DB_USERNAME: ${DB_USERNAME:-root}
      # DB_PASSWORD, JWT_SECRET, AI_SERVICE_API_KEY are loaded from Docker secrets
      # via docker-entrypoint.sh which reads /run/secrets/<name>
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      # CORS: In production, frontend & API share same origin via nginx, so allow same origin
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
    depends_on:
      mysql:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    secrets:
      - db_password
      - jwt_secret
      - ai_service_api_key
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

  # ---------- Frontend (React SPA) ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobmatch-frontend-prod
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M

  # ---------- Nginx Reverse Proxy ----------
  nginx:
    image: nginx:alpine
    container_name: jobmatch-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      # Uncomment for HTTPS in production:
      # - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - ai-service
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          memory: 64M

volumes:
  mysql-data-prod:
    driver: local