# Nginx configuration for serving the React SPA
# This is used inside the frontend container (not the reverse proxy)

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Cache static assets (hashed filenames from React build)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker (not hashed, must be revalidated)
    location /service-worker.js {
        expires 0;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # All other routes - serve index.html for SPA routing
    location / {
        try_files $uri $uri/ /index.html;

        # No cache for HTML to ensure fresh app loads
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
}