$kind: http-request
name: Apply to Job
method: POST
url: 'http://localhost:8081/api/v1/applications/apply'
order: 3000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: Bearer {{token}}
body:
  type: json
  content: |-
    {
      "jobId": 1,
      "coverLetter": "I am very interested in this position"
    }