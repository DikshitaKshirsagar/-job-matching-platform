$kind: http-request
name: Register
method: POST
url: 'http://localhost:8081/api/v1/auth/register'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "fullName": "John Doe",
      "email": "john.doe@example.com",
      "password": "password123",
      "confirmPassword": "password123",
      "role": "SEEKER"
    }