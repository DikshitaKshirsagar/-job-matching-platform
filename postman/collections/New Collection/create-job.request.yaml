$kind: http-request
name: Create Job
method: POST
url: 'http://localhost:8081/api/v1/jobs'
order: 2000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: Bearer {{token}}
body:
  type: json
  content: |-
    {
      "title": "Software Engineer",
      "description": "Looking for a skilled Java developer",
      "company": "Tech Corp",
      "location": "New York",
      "requiredSkills": "Java, Spring Boot, SQL",
      "jobType": "FULL_TIME",
      "salaryMin": 80000,
      "salaryMax": 120000
    }