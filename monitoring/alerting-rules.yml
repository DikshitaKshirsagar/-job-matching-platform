groups:
  - name: job-match-alerts
    interval: 30s
    rules:
      # CPU alerts
      - alert: HighCPUUsage
        expr: avg(rate(process_cpu_seconds_total[5m])) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is above 80% for more than 5 minutes"

      - alert: CriticalCPUUsage
        expr: avg(rate(process_cpu_seconds_total[5m])) > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical CPU usage detected"
          description: "CPU usage is above 95% for more than 2 minutes"

      # Memory alerts
      - alert: HighMemoryUsage
        expr: jvm_memory_used_bytes / jvm_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "JVM memory usage is above 80% for {{ $value | humanizePercentage }}"

      - alert: CriticalMemoryUsage
        expr: jvm_memory_used_bytes / jvm_memory_max_bytes > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical memory usage detected"
          description: "JVM memory usage is above 95% for {{ $value | humanizePercentage }}"

      # Error rate alerts
      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) / rate(http_server_requests_seconds_count[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} for the last 5 minutes"

      - alert: Elevated4xxRate
        expr: rate(http_server_requests_seconds_count{status=~"4.."}[5m]) / rate(http_server_requests_seconds_count[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated 4xx error rate"
          description: "4xx error rate is {{ $value | humanizePercentage }}"

      # Latency alerts
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency detected"
          description: "P95 latency is above 2 seconds"

      - alert: CriticalLatency
        expr: histogram_quantile(0.99, rate(http_server_requests_seconds_bucket[5m])) > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical API latency detected"
          description: "P99 latency is above 5 seconds"

      # Database alerts
      - alert: DatabaseConnectionPoolExhausted
        expr: jdbc_connections_active / jdbc_connections_max > 0.9
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool near exhaustion"
          description: "Database connection pool is {{ $value | humanizePercentage }} utilized"

      - alert: SlowQueriesDetected
        expr: increase(hikaricp_connections_timeout_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Slow queries detected"
          description: "Database connection timeouts occurring"

      # Instance down alerts
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} is down"
          description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 1 minute"

      # Disk space alerts
      - alert: DiskSpaceLow
        expr: disk_free_bytes / disk_total_bytes < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space"
          description: "Disk space is below 10% on {{ $labels.instance }}"

      # SLA monitoring
      - alert: SLA_UptimeBreach
        expr: avg_over_time(up[30d]) < 0.995
        for: 1h
        labels:
          severity: critical
          sla: "uptime"
        annotations:
          summary: "SLA uptime breach risk"
          description: "Uptime over 30 days is below 99.5%"

      - alert: SLA_LatencyBreach
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 3
        for: 15m
        labels:
          severity: critical
          sla: "latency"
        annotations:
          summary: "SLA latency breach risk"
          description: "P95 latency exceeds SLA threshold of 3 seconds"