version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: jobmatch-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-ChangeMeStrongPassword123!}
      MYSQL_DATABASE: ${DB_NAME:-jobmatch_db}
    ports:
      - '3307:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    environment:
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 512M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '8081:8081'
    env_file:
      - ./backend/.env
    depends_on:
      mysql:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    environment:
      # Override DB_URI with Docker service name (internal Docker network)
      DB_URI: jdbc:mysql://mysql:3306/jobmatch_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      # Override AI_SERVICE_URL with Docker service name
      AI_SERVICE_URL: http://ai-service:5000
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-ChangeMeStrongPassword123!}
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-change-in-production-minimum-32-chars}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

volumes:
  mysql-data:
